<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="https://assets.hydrogen.sagittarius.connect.product.adaptavist.com/public/js/bridge.js"></script>
</head>

<body>
  <div id="message" style="font-family: Arial, sans-serif; font-size: 13px;">
    Loading Clone warning check...
  </div>

  <script>
    const box = document.getElementById("message");

    function showDebug(text) {
      box.innerHTML = `
        <div style="padding:8px; border:1px solid #ccc; background:#f4f5f7;">
          ${text}
        </div>
      `;
    }

    function showWarning() {
      box.innerHTML = `
        <div style="
          color: #de350b;
          background: #ffebe6;
          border: 1px solid #de350b;
          border-radius: 4px;
          padding: 10px;
          font-weight: 600;">
          Clone for this issue is disabled. Please use the <strong>Clone without parent</strong> option.
        </div>
      `;
    }

    async function run() {
      try {
        if (!window.AdaptavistBridge || !window.AdaptavistBridgeContext) {
          showDebug("Adaptavist Bridge not available. This page must be loaded inside a ScriptRunner Cloud Script Fragment.");
          return;
        }

        const issueKey = AdaptavistBridgeContext.context.issueKey;

        if (!issueKey) {
          showDebug("No issue key found in ScriptRunner context.");
          return;
        }

        const issue = await AdaptavistBridge.request({
          url: `/rest/api/3/issue/${issueKey}?fields=parent,issuetype,status`,
          type: "GET"
        });

        const parentKey = issue.fields?.parent?.key;

        if (!parentKey) {
          box.innerHTML = "";
          return;
        }

        const parentIssue = await AdaptavistBridge.request({
          url: `/rest/api/3/issue/${parentKey}?fields=issuetype,status`,
          type: "GET"
        });

        const parentIssueType = parentIssue.fields?.issuetype?.name;
        const parentStatusCategory = parentIssue.fields?.status?.statusCategory?.key;

        if (parentIssueType === "Epic" && parentStatusCategory === "done") {
          showWarning();
        } else {
          box.innerHTML = "";
        }

      } catch (e) {
        showDebug("Error: " + e.message);
      }
    }

    run();
  </script>
</body>
</html>
