<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://assets.hydrogen.sagittarius.connect.product.adaptavist.com/public/js/bridge.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: transparent; }
#clone-warning-banner {
    display: none;
    background-color: #fff0f0;
    border: 1.5px solid #d32f2f;
    border-left: 5px solid #d32f2f;
    border-radius: 4px;
    padding: 10px 14px;
    margin-bottom: 12px;
    align-items: flex-start;
    gap: 10px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
</style>
</head>
<body>

<div id="clone-warning-banner">
    <span style="color:#d32f2f;font-size:18px;line-height:1.3;">⛔</span>
    <span style="color:#d32f2f;font-size:13px;line-height:1.5;">
        <strong>Clone for this issue is disabled.</strong><br>
        Please use the <strong><em>Clone without parent</em></strong> option.
    </span>
</div>

<script>
var banner = document.getElementById('clone-warning-banner');

function hideBanner() { if (banner) banner.style.display = 'none'; }
function showBanner() { if (banner) banner.style.display = 'flex'; }

var issueKey = AdaptavistBridgeContext.context.issueKey;

if (!issueKey) {
    hideBanner();
} else {
    AdaptavistBridge.request({
        url: '/rest/api/3/issue/' + issueKey + '?fields=parent',
        type: 'GET'
    })
    .then(function(data) {
        var parent = data && data.fields && data.fields.parent;
        if (!parent) { hideBanner(); return; }

        return AdaptavistBridge.request({
            url: '/rest/api/3/issue/' + parent.key + '?fields=status',
            type: 'GET'
        })
        .then(function(parentData) {
            var catKey = parentData.fields
                && parentData.fields.status
                && parentData.fields.status.statusCategory
                && parentData.fields.status.statusCategory.key;

            if (catKey === 'done') { showBanner(); } else { hideBanner(); }
        });
    })
    .catch(function(e) {
        console.warn('Clone warning error:', e);
        hideBanner();
    });
}
</script>

</body>
</html>
